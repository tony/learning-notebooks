# notes/curriculum.toml — AUTHORED. The editorial overlay on the curriculum.
#
# Three authored grains:
#   [ladder]    — the mastery rungs (legend).
#   [[track]]   — one course per row in notes/taxonomy.md. Owns topic prose,
#                 mastery, status, and the M:N notebook links. Each
#                 `notebooks` entry is { path, label?, rung } — `rung` is the
#                 per-notebook mastery level (the authoritative home now that
#                 notebooks carry no docstring tag).
#   [[project]] — one studied library. The join spine across notebook ↔ source
#                 clone ↔ architecture study ↔ track. `name` matches the
#                 notebook library directory, so notebook→project is derived by
#                 path (notebooks/data/polars/… → project "polars").
#
# Mechanical notebook fields (title, summary, packages from PEP 723, headings,
# upstream URL, clone path) are DERIVED from the notebooks by
# scripts/curriculum.py — never duplicate them here. This file holds only human
# judgement. The full mastery-ladder narrative lives in notes/taxonomy.head.md.

[ladder]
fundamentals = "first principles, stdlib-first"
self-sufficiency = "drive the real library"
reproducible = "compose tools as one system"
production = "org-scale patterns"

[[track]]
id = "Toolchain"
domain = "0"
topic = "Reproducible study notebooks"
mastery = "self-sufficiency"
status = "existing"
notebooks = [
  { path = "notebooks/toolchain/marimo/001_basics.py", rung = "self-sufficiency" },
  { path = "notebooks/toolchain/curriculum/001_index.py", label = "curriculum index", rung = "reproducible" },
]
architecture = ["marimo", "uv", "ruff", "pytest"]
packages = "marimo, uv, ruff, ty, pytest, rich"
license_status = "permissive (Apache-2.0 / MIT)"

