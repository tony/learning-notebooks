# notes/curriculum.toml — AUTHORED. The editorial overlay on the curriculum,
# keyed at the taxonomy-TRACK grain (one [[track]] per row in notes/taxonomy.md).
#
# Mechanical notebook fields (title, summary, packages from PEP 723, headings,
# upstream URL, clone path) are DERIVED from the notebooks by
# scripts/curriculum.py — never duplicate them here. This file holds only
# human judgement: topic prose, mastery rung, status, architecture pointers,
# sibling-repo curricula, and the M:N track↔notebook links.
#
# `notebooks` entries: { path = "...", label = "..." }. Omit `label` to render
# the path itself as the link text. A track may claim zero notebooks (a
# sibling-repo curriculum or study-only row) or several; a notebook may be
# claimed by several tracks (pyarrow/001 sits under B3 and B4).
#
# `sibling_curricula` and the `packages` / `license_status` columns are
# authored markdown fragments rendered verbatim — they describe study targets
# beyond PEP 723 deps (e.g. A4's GPL study-only row), so they cannot be
# derived. The full mastery-ladder narrative lives in notes/taxonomy.head.md;
# the short labels here caption coverage rollups.

[ladder]
L1 = "fundamentals"
L2 = "self-sufficiency"
L3 = "reproducible & synergy"
L4 = "enterprise"

[[track]]
id = "Toolchain"
domain = "0"
topic = "Reproducible study notebooks"
mastery = "L2"
status = "existing"
notebooks = [
  { path = "notebooks/toolchain/marimo/001_basics.py" },
]
architecture = ["marimo", "uv", "ruff", "pytest"]
packages = "marimo, uv, ruff, ty, pytest, rich"
license_status = "permissive (Apache-2.0 / MIT)"

