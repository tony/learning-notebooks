name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dev tooling
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check

      # marimo's notebook-aware linter. Scoped to .py notebooks only:
      # `marimo check` treats prose .md files as markdown notebooks.
      - name: marimo check
        run: uv run marimo check --strict notebooks/ notes/notebook_template.py

      # Notebook PEP 723 deps must stay permissively licensed
      # (deny list: notes/taxonomy.md "License policy").
      - name: License deny-list
        run: uv run scripts/check_licenses.py

      # Each notebook resolves its own PEP 723 deps in an isolated env.
      # Only lightweight notebooks belong here — no GPU deps, no model
      # downloads (see AGENTS.md "CI-safety").
      - name: Smoke-run light notebooks
        run: |
          uv run notes/notebook_template.py
          uv run notebooks/toolchain/marimo/001_basics.py
          uv run notebooks/systems/cpython/001_bytecode_dis.py
          uv run notebooks/data/pandas/001_dataframes.py
          uv run notebooks/data/ibis/001_duckdb_sql.py
          uv run notebooks/data/numpy/001_broadcasting_strides.py
          uv run notebooks/data/polars/001_lazy_frames.py
          uv run notebooks/data/duckdb/001_vectorized_exec.py
          uv run notebooks/data/pyarrow/001_columnar_memory.py
          uv run notebooks/systems/rich/001_console_rendering.py
          uv run notebooks/systems/anyio/001_structured_concurrency.py
          uv run notebooks/systems/sortedcontainers/001_ordered_structures.py
          uv run notebooks/ml/sklearn/001_estimator_api.py
          uv run notebooks/ml/tokenizers/001_bpe_from_scratch.py
          uv run notebooks/ml/torch/001_autograd.py
